<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concierge</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      html, body { background-color: rgba(0,0,0,0) !important; margin: 0; padding: 0; }
      #welcome-overlay {
        position: fixed; inset: 0; z-index: 50;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none; opacity: 0;
        background: rgba(26,26,26,0.88); border-radius: 12px;
      }
    </style>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body class="bg-transparent m-0 p-0">

    <!-- Welcome overlay -->
    <div id="welcome-overlay">
      <span style="color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;font-weight:300;font-family:sans-serif;">Welcome</span>
    </div>

    <div id="app" class="w-[320px] rounded-xl bg-[#1a1a1a] border border-white/10 shadow-2xl overflow-hidden font-sans">

      <!-- Header -->
      <div class="px-4 py-3 flex items-center justify-between border-b border-white/8">
        <span data-tauri-drag-region class="text-white/70 text-xs font-medium tracking-widest uppercase flex-1 cursor-default select-none">Concierge</span>
        <button id="btn-close" class="text-white/25 hover:text-white/50 transition-colors text-[11px] leading-none cursor-pointer">✕</button>
      </div>

      <!-- Hero area — content injected by JS based on app state -->
      <div id="hero" class="px-4 py-6 flex flex-col items-center gap-2 min-h-[72px] justify-center">
      </div>

      <!-- Divider -->
      <div class="border-t border-white/8 mx-0"></div>

      <!-- Always-on bottom section -->
      <div class="px-3 py-3 flex flex-col gap-3">

        <!-- Last synced timestamp -->
        <p id="last-synced-label" class="hidden text-[9px] text-white/20"></p>

        <!-- Weekly Brief -->
        <div class="rounded-lg bg-white/[0.03] border border-white/8 overflow-hidden">
          <button id="btn-brief-toggle" class="w-full flex items-center justify-between px-2.5 py-1.5 text-left">
            <span class="text-white/30 text-[9px] font-medium tracking-widest uppercase">Weekly Brief</span>
            <span id="brief-badge" class="text-[9px] text-white/25">—</span>
          </button>
          <div id="brief-content" class="hidden px-2.5 pb-2 flex flex-col gap-1">
            <div id="brief-rows" class="flex flex-col gap-1.5"></div>
            <div id="brief-updated" class="mt-1 text-[9px] text-white/15"></div>
          </div>
        </div>

        <!-- Bottom bar -->
        <div class="flex items-center justify-between">
          <button id="btn-dashboard" class="text-[10px] text-white/30 hover:text-white/60 transition-colors cursor-pointer">Dashboard →</button>
          <button id="btn-settings-toggle" class="text-[10px] text-white/20 hover:text-white/45 transition-colors cursor-pointer">⚙ Settings</button>
          <button id="btn-new-cycle" class="text-[10px] text-white/20 hover:text-white/45 transition-colors cursor-pointer">↺ new cycle</button>
        </div>

      </div>

      <!-- Settings Panel (hidden until toggled) -->
      <div id="settings-panel" class="hidden border-t border-white/8 px-3 py-3">
        <div class="flex items-center justify-between mb-3">
          <span class="text-white/50 text-[10px] font-medium tracking-widest uppercase">Settings</span>
          <button id="btn-settings-close" class="text-white/25 hover:text-white/50 text-[10px] transition-colors cursor-pointer">✕</button>
        </div>
        <div class="flex flex-col gap-2.5 max-h-[240px] overflow-y-auto pr-0.5">
          <!-- AI Section -->
          <span class="text-white/30 text-[8px] font-medium tracking-widest uppercase">AI Provider</span>
          <div class="flex items-center justify-between">
            <label class="text-[10px] text-white/45">Provider</label>
            <select id="settings-provider" class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 cursor-pointer">
              <option value="ollama">Ollama (local)</option>
              <option value="openai">OpenAI-Compatible</option>
              <option value="claude">Claude CLI</option>
            </select>
          </div>
          <div id="settings-ollama-fields" class="hidden flex-col gap-2">
            <div id="settings-apiKey-container" class="hidden flex-row items-center justify-between">
              <label class="text-[10px] text-white/45">API Key</label>
              <input id="settings-api-key" type="password" placeholder="sk-..."
                class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
            </div>
            <div class="flex items-center justify-between">
              <label class="text-[10px] text-white/45">Model</label>
              <input id="settings-ollama-model" list="settings-ollama-models-list" type="text" placeholder="gemma4:e4b"
                class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
              <datalist id="settings-ollama-models-list"></datalist>
            </div>
            <div class="flex items-center justify-between">
              <label class="text-[10px] text-white/45">Base URL</label>
              <input id="settings-ollama-url" type="text" placeholder="http://localhost:11434"
                class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
            </div>
          </div>
          
          <!-- Divider -->
          <div class="border-t border-white/5 my-1"></div>

          <!-- Actual Budget Section -->
          <span class="text-white/30 text-[8px] font-medium tracking-widest uppercase">Actual Budget</span>
          <div class="flex items-center justify-between">
            <label class="text-[10px] text-white/45">Server URL</label>
            <input id="settings-actual-url" type="text" placeholder="http://localhost:5007"
              class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
          </div>
          <div class="flex items-center justify-between">
            <label class="text-[10px] text-white/45">Password</label>
            <input id="settings-actual-password" type="password" placeholder="••••••••"
              class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
          </div>
          <div class="flex items-center justify-between">
            <label class="text-[10px] text-white/45">Sync ID</label>
            <input id="settings-actual-sync-id" type="text" placeholder="your sync id"
              class="text-[10px] bg-white/8 border border-white/10 text-white/60 rounded px-1.5 py-0.5 w-[130px] outline-none focus:border-white/25" />
          </div>

          <button id="btn-settings-save"
            class="w-full text-[10px] py-1 rounded-md bg-white/8 hover:bg-white/12 text-white/60 hover:text-white/90 transition-all cursor-pointer border border-white/8">
            Save
          </button>
          <p id="settings-status" class="text-[9px] text-white/25 text-center min-h-[12px]"></p>
        </div>
      </div>

      <!-- Claude Review Panel (hidden until triggered) -->
      <div id="review-panel" class="hidden border-t border-white/8 px-3 py-3">
        <div class="flex items-center justify-between mb-3">
          <span id="review-title" class="text-white/50 text-[10px] font-medium tracking-widest uppercase">AI Suggestions</span>
          <button id="btn-cancel-review" class="text-white/25 hover:text-white/50 text-[10px] transition-colors cursor-pointer">Cancel</button>
        </div>
        <div id="review-list" class="flex flex-col gap-1.5 max-h-[220px] overflow-y-auto"></div>
        <button id="btn-apply" class="mt-3 w-full text-[11px] py-1.5 rounded-md bg-white/8 hover:bg-white/12 text-white/70 hover:text-white/90 transition-all cursor-pointer border border-white/8">
          Apply all
        </button>
        <p id="apply-status" class="mt-1.5 text-[10px] text-white/30 min-h-[14px]"></p>
      </div>

    </div>
  </body>
</html>
